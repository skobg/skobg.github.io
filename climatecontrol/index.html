<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Climate Control — SKO.BG</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f7f6f3;
      --surface:  #ffffff;
      --ink:      #111111;
      --muted:    #6b6b6b;
      --rule:     #e0ddd8;
      --accent:   #0d2b52;
      --accent-h: #1a4a8a;
      --on:       #1a7a42;
      --off:      #99231f;
      /* Categorical chart series — fixed order, never reassigned per filter.
         Reference palette (validated: adjacent-pair CVD ok; slot 2 is
         sub-3:1 on a light surface, mitigated by always-on legend + line-key
         labels + the table view, never color-alone identity). */
      --series-1: #2a78d6;
      --series-2: #1baf7a;
      --series-3: #eda100;
      --series-4: #008300;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, "Segoe UI", Helvetica Neue, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(20px, 5vw, 60px) 16px;
    }

    a { color: inherit; }

    .wrap { width: 100%; max-width: 560px; }

    header { margin-bottom: 28px; text-align: center; }
    .wordmark { font-size: 14px; font-weight: 700; letter-spacing: 0.12em; color: var(--accent); }
    h1 { font-size: 22px; margin-top: 6px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .field { margin-bottom: 14px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }

    input[type="password"], input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid var(--rule);
      border-radius: 8px;
      background: var(--bg);
      color: var(--ink);
    }

    button {
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-primary:disabled { background: var(--rule); color: var(--muted); cursor: not-allowed; }

    .btn-on  { background: var(--on);  color: #fff; }
    .btn-off { background: var(--off); color: #fff; }
    .btn-set { background: var(--accent); color: #fff; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--rule); }

    .error { color: var(--off); font-size: 13px; margin-top: 10px; min-height: 1em; }

    .device-name { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .device-model { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

    .status-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
    .status-badge {
      font-size: 12px; font-weight: 700; letter-spacing: 0.04em;
      padding: 3px 10px; border-radius: 999px; color: #fff;
    }
    .status-badge.on  { background: var(--on); }
    .status-badge.off { background: var(--off); }
    .temps { font-size: 14px; color: var(--muted); }
    .temps b { color: var(--ink); }

    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .controls .power-group { display: flex; gap: 8px; }
    .controls .temp-group { display: flex; gap: 8px; align-items: center; flex: 1; min-width: 180px; }
    .controls input[type="number"] { width: 70px; flex: none; }

    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .refresh-note { font-size: 12px; color: var(--muted); }

    .hidden { display: none; }

    /* ── Temperature history chart ── */
    .history-header {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 10px; margin-bottom: 14px;
    }

    .range-group { display: flex; gap: 2px; background: var(--bg); border-radius: 8px; padding: 2px; }
    .range-btn {
      background: transparent; color: var(--muted); font-size: 12px; font-weight: 600;
      padding: 6px 10px; border-radius: 6px;
    }
    .range-btn.active { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(11,11,11,0.10); }

    .chart-wrap { position: relative; }
    #chart-svg { width: 100%; height: 220px; display: block; }
    #chart-svg text { font-family: inherit; }

    .chart-tooltip {
      position: absolute; top: 8px; z-index: 5;
      background: var(--surface); border: 1px solid var(--rule); border-radius: 8px;
      padding: 8px 10px; font-size: 12px; min-width: 140px;
      box-shadow: 0 2px 8px rgba(11,11,11,0.12); pointer-events: none;
    }
    .tooltip-time { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
    .tooltip-row { display: flex; align-items: center; gap: 6px; padding: 1px 0; }
    .tooltip-key { width: 12px; height: 2px; border-radius: 1px; flex: none; }
    .tooltip-label { color: var(--muted); flex: 1; }
    .tooltip-value { font-weight: 700; color: var(--ink); }

    .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .legend-key { width: 14px; height: 2px; border-radius: 1px; }

    .chart-table-scroll { max-height: 240px; overflow-y: auto; margin-top: 10px; border: 1px solid var(--rule); border-radius: 8px; }
    #chart-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    #chart-table th, #chart-table td {
      text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--rule);
      font-variant-numeric: tabular-nums;
    }
    #chart-table th { color: var(--muted); font-weight: 600; font-size: 11px; position: sticky; top: 0; background: var(--surface); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="wordmark">SKO.BG</div>
      <h1>Climate Control</h1>
    </header>

    <div id="login-card" class="card">
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" />
      </div>
      <button class="btn-primary" id="login-btn">Log in</button>
      <div class="error" id="login-error"></div>
    </div>

    <div id="app" class="hidden">
      <div class="topbar">
        <span class="refresh-note" id="refresh-note"></span>
        <button class="btn-ghost" id="logout-btn">Log out</button>
      </div>
      <div id="devices"></div>

      <div class="card">
        <div class="history-header">
          <div class="device-name">Temperature History</div>
          <div class="range-group" id="range-group">
            <button class="range-btn" data-hours="6">6h</button>
            <button class="range-btn active" data-hours="24">24h</button>
            <button class="range-btn" data-hours="168">7d</button>
            <button class="range-btn" data-hours="720">30d</button>
          </div>
        </div>
        <div class="chart-wrap">
          <svg id="chart-svg" viewBox="0 0 600 260" preserveAspectRatio="none"></svg>
          <div class="chart-tooltip hidden" id="chart-tooltip"></div>
        </div>
        <div class="legend" id="chart-legend"></div>
        <button class="btn-ghost" id="table-toggle" style="margin-top: 12px;">Show as table</button>
        <div class="chart-table-scroll hidden" id="chart-table-wrap">
          <table id="chart-table">
            <thead><tr><th>Time</th><th>Location</th><th>°C</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="error" id="chart-error"></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://donutvip.ddns.net/climatecontrol-api";
    const TOKEN_KEY = "climatecontrol_token";
    const REFRESH_MS = 20000;
    const CHART_REFRESH_MS = 5 * 60 * 1000; // underlying log only updates every 10 min server-side
    const CHART_COLORS = ["var(--series-1)", "var(--series-2)", "var(--series-3)", "var(--series-4)"];

    const loginCard = document.getElementById("login-card");
    const appEl = document.getElementById("app");
    const devicesEl = document.getElementById("devices");
    const loginError = document.getElementById("login-error");
    const refreshNote = document.getElementById("refresh-note");

    let refreshTimer = null;
    let chartRefreshTimer = null;
    let chartRangeHours = 24;
    let chartRawData = [];
    let knownLocations = []; // fixed color-assignment order — first-seen, never reshuffled

    function token() { return sessionStorage.getItem(TOKEN_KEY); }
    function setToken(t) { t ? sessionStorage.setItem(TOKEN_KEY, t) : sessionStorage.removeItem(TOKEN_KEY); }

    async function api(path, options = {}) {
      const resp = await fetch(API_BASE + path, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          ...(token() ? { Authorization: "Bearer " + token() } : {}),
          ...(options.headers || {}),
        },
      });
      if (resp.status === 401) {
        setToken(null);
        showLogin();
        throw new Error("Session expired — please log in again");
      }
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(data.detail || `Request failed (${resp.status})`);
      return data;
    }

    function showLogin() {
      clearInterval(refreshTimer);
      clearInterval(chartRefreshTimer);
      loginCard.classList.remove("hidden");
      appEl.classList.add("hidden");
    }

    function showApp() {
      loginCard.classList.add("hidden");
      appEl.classList.remove("hidden");
      loadDevices();
      refreshTimer = setInterval(loadDevices, REFRESH_MS);
      loadTemperatureHistory();
      chartRefreshTimer = setInterval(loadTemperatureHistory, CHART_REFRESH_MS);
    }

    document.getElementById("login-btn").addEventListener("click", doLogin);
    document.getElementById("password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });

    async function doLogin() {
      const password = document.getElementById("password").value;
      loginError.textContent = "";
      try {
        const data = await api("/login", { method: "POST", body: JSON.stringify({ password }) });
        setToken(data.token);
        document.getElementById("password").value = "";
        showApp();
      } catch (e) {
        loginError.textContent = e.message;
      }
    }

    document.getElementById("logout-btn").addEventListener("click", async () => {
      try { await api("/logout", { method: "POST" }); } catch (e) { /* token already invalid — fine */ }
      setToken(null);
      showLogin();
    });

    function deviceCardHtml(device) {
      return `
        <div class="card" data-uuid="${device.uuid}">
          <div class="device-name">${device.name}</div>
          <div class="device-model">${device.model || ""}</div>
          <div class="status-row">
            <span class="status-badge" data-role="badge">…</span>
            <span class="temps" data-role="temps"></span>
          </div>
          <div class="controls">
            <div class="power-group">
              <button class="btn-on" data-action="on">On</button>
              <button class="btn-off" data-action="off">Off</button>
            </div>
            <div class="temp-group">
              <input type="number" min="5" max="35" data-role="temp-input" />
              <button class="btn-set" data-action="set-temp">Set °C</button>
            </div>
          </div>
          <div class="error" data-role="error"></div>
        </div>`;
    }

    function colorForLocation(name) {
      let idx = knownLocations.indexOf(name);
      if (idx === -1) { knownLocations.push(name); idx = knownLocations.length - 1; }
      return CHART_COLORS[idx % CHART_COLORS.length];
    }

    async function loadDevices() {
      try {
        const devices = await api("/devices");
        if (!devicesEl.dataset.built) {
          devices.forEach((d) => colorForLocation(d.name)); // fixes color order to match card order
          devicesEl.innerHTML = devices.map(deviceCardHtml).join("");
          devicesEl.dataset.built = "1";
          devicesEl.querySelectorAll(".card").forEach(wireCard);
        }
        await Promise.all(devices.map((d) => refreshStatus(d.uuid)));
        refreshNote.textContent = "Updated " + new Date().toLocaleTimeString();
      } catch (e) {
        refreshNote.textContent = e.message;
      }
    }

    async function refreshStatus(uuid) {
      const card = devicesEl.querySelector(`.card[data-uuid="${uuid}"]`);
      if (!card) return;
      try {
        const s = await api(`/devices/${uuid}/status`);
        const badge = card.querySelector('[data-role="badge"]');
        badge.textContent = s.on ? "ON" : "OFF";
        badge.className = "status-badge " + (s.on ? "on" : "off");
        card.querySelector('[data-role="temps"]').innerHTML =
          `current <b>${s.current_c.toFixed(1)}°C</b> · target <b>${s.target_c.toFixed(1)}°C</b>`;
        const tempInput = card.querySelector('[data-role="temp-input"]');
        if (document.activeElement !== tempInput) tempInput.value = Math.round(s.target_c);
      } catch (e) {
        card.querySelector('[data-role="error"]').textContent = e.message;
      }
    }

    function wireCard(card) {
      const uuid = card.dataset.uuid;
      const errorEl = card.querySelector('[data-role="error"]');

      card.querySelector('[data-action="on"]').addEventListener("click", () => setPower(uuid, true, errorEl));
      card.querySelector('[data-action="off"]').addEventListener("click", () => setPower(uuid, false, errorEl));
      card.querySelector('[data-action="set-temp"]').addEventListener("click", () => {
        const value = parseInt(card.querySelector('[data-role="temp-input"]').value, 10);
        setTemperature(uuid, value, errorEl);
      });
    }

    async function setPower(uuid, on, errorEl) {
      errorEl.textContent = "";
      try {
        await api(`/devices/${uuid}/power`, { method: "POST", body: JSON.stringify({ on }) });
        await refreshStatus(uuid);
      } catch (e) {
        errorEl.textContent = e.message;
      }
    }

    async function setTemperature(uuid, temperature_c, errorEl) {
      errorEl.textContent = "";
      if (!Number.isFinite(temperature_c)) {
        errorEl.textContent = "Enter a valid temperature";
        return;
      }
      try {
        await api(`/devices/${uuid}/temperature`, { method: "POST", body: JSON.stringify({ temperature_c }) });
        await refreshStatus(uuid);
      } catch (e) {
        errorEl.textContent = e.message;
      }
    }

    // ── Temperature history chart ──────────────────────────────────────────

    document.querySelectorAll(".range-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".range-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        chartRangeHours = parseFloat(btn.dataset.hours);
        loadTemperatureHistory();
      });
    });

    document.getElementById("table-toggle").addEventListener("click", (e) => {
      const wrap = document.getElementById("chart-table-wrap");
      const willShow = wrap.classList.contains("hidden");
      wrap.classList.toggle("hidden");
      e.target.textContent = willShow ? "Hide table" : "Show as table";
    });

    async function loadTemperatureHistory() {
      const chartError = document.getElementById("chart-error");
      try {
        chartRawData = await api(`/temperature-log?hours=${chartRangeHours}`);
        chartError.textContent = "";
        renderChart();
        renderChartTable();
      } catch (e) {
        chartError.textContent = e.message;
      }
    }

    function renderChartTable() {
      const tbody = document.querySelector("#chart-table tbody");
      tbody.innerHTML = "";
      const sorted = [...chartRawData].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      for (const row of sorted) {
        const tr = document.createElement("tr");
        const tTime = document.createElement("td");
        tTime.textContent = new Date(row.timestamp).toLocaleString();
        const tLoc = document.createElement("td");
        tLoc.textContent = row.location;
        const tTemp = document.createElement("td");
        tTemp.textContent = row.temperature_c.toFixed(1);
        tr.append(tTime, tLoc, tTemp);
        tbody.appendChild(tr);
      }
    }

    function renderChart() {
      const svg = document.getElementById("chart-svg");
      const legend = document.getElementById("chart-legend");
      const W = 600, H = 260;
      const padL = 42, padR = 10, padT = 10, padB = 26;
      const plotW = W - padL - padR, plotH = H - padT - padB;
      const ns = "http://www.w3.org/2000/svg";

      svg.innerHTML = "";
      legend.innerHTML = "";

      if (chartRawData.length === 0) {
        const text = document.createElementNS(ns, "text");
        text.setAttribute("x", W / 2);
        text.setAttribute("y", H / 2);
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("font-size", "13");
        text.setAttribute("fill", "var(--muted)");
        text.textContent = "No data yet";
        svg.appendChild(text);
        return;
      }

      const byLocation = {};
      for (const row of chartRawData) {
        if (!byLocation[row.location]) byLocation[row.location] = [];
        byLocation[row.location].push(row);
      }
      for (const loc in byLocation) byLocation[loc].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

      const allTimes = chartRawData.map((r) => new Date(r.timestamp).getTime());
      const allTemps = chartRawData.map((r) => r.temperature_c);
      const xMin = Math.min(...allTimes), xMax = Math.max(...allTimes);
      let yMin = Math.min(...allTemps), yMax = Math.max(...allTemps);
      if (yMin === yMax) { yMin -= 1; yMax += 1; }
      const yPad = (yMax - yMin) * 0.1 || 1;
      yMin -= yPad; yMax += yPad;

      const xScale = (t) => padL + (xMax === xMin ? plotW / 2 : ((t - xMin) / (xMax - xMin)) * plotW);
      const yScale = (v) => padT + plotH - ((v - yMin) / (yMax - yMin)) * plotH;

      function addEl(tag, attrs) {
        const el = document.createElementNS(ns, tag);
        for (const k in attrs) el.setAttribute(k, attrs[k]);
        svg.appendChild(el);
        return el;
      }

      // gridlines + y-axis labels (recessive hairlines, rounded to whole degrees)
      const ySteps = 4;
      for (let i = 0; i <= ySteps; i++) {
        const v = yMin + ((yMax - yMin) * i) / ySteps;
        const y = yScale(v);
        addEl("line", { x1: padL, y1: y, x2: W - padR, y2: y, stroke: "var(--rule)", "stroke-width": 1 });
        addEl("text", { x: padL - 6, y: y + 3, "text-anchor": "end", "font-size": 10, fill: "var(--muted)" }).textContent = v.toFixed(0) + "°";
      }

      // x-axis labels — HH:mm for <=24h ranges, DD.MM for longer ones
      const xSteps = 4;
      for (let i = 0; i <= xSteps; i++) {
        const t = xMin + ((xMax - xMin) * i) / xSteps;
        const x = xScale(t);
        const d = new Date(t);
        const label = chartRangeHours <= 24
          ? d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
          : d.toLocaleDateString([], { day: "2-digit", month: "2-digit" });
        addEl("text", { x, y: H - 8, "text-anchor": "middle", "font-size": 10, fill: "var(--muted)" }).textContent = label;
      }

      // one line + end-dot per location, fixed color order (color follows the
      // entity, never repainted when the time-range filter changes the set of
      // points shown)
      const locations = Object.keys(byLocation);
      for (const loc of locations) {
        const color = colorForLocation(loc);
        const pts = byLocation[loc];
        const d = pts.map((p, i) => `${i === 0 ? "M" : "L"} ${xScale(new Date(p.timestamp).getTime())} ${yScale(p.temperature_c)}`).join(" ");
        addEl("path", { d, fill: "none", stroke: color, "stroke-width": 2, "stroke-linecap": "round", "stroke-linejoin": "round" });
        const last = pts[pts.length - 1];
        addEl("circle", {
          cx: xScale(new Date(last.timestamp).getTime()), cy: yScale(last.temperature_c),
          r: 4, fill: color, stroke: "var(--surface)", "stroke-width": 2,
        });

        const item = document.createElement("span");
        item.className = "legend-item";
        const key = document.createElement("span");
        key.className = "legend-key";
        key.style.background = color;
        const label = document.createElement("span");
        label.textContent = loc; // textContent — location names are untrusted (Eldom device names), never innerHTML
        item.append(key, label);
        legend.appendChild(item);
      }

      wireCrosshair(svg, padL, plotW, padT, plotH, xScale, W);
    }

    function wireCrosshair(svg, padL, plotW, padT, plotH, xScale, viewW) {
      const ns = "http://www.w3.org/2000/svg";
      const tooltip = document.getElementById("chart-tooltip");
      const distinctTimes = [...new Set(chartRawData.map((r) => r.timestamp))].sort();

      const hitRect = document.createElementNS(ns, "rect");
      hitRect.setAttribute("x", padL);
      hitRect.setAttribute("y", padT);
      hitRect.setAttribute("width", plotW);
      hitRect.setAttribute("height", plotH);
      hitRect.setAttribute("fill", "transparent");
      svg.appendChild(hitRect);

      const crosshair = document.createElementNS(ns, "line");
      crosshair.setAttribute("y1", padT);
      crosshair.setAttribute("y2", padT + plotH);
      crosshair.setAttribute("stroke", "var(--muted)");
      crosshair.setAttribute("stroke-width", 1);
      crosshair.setAttribute("stroke-dasharray", "3,3");
      crosshair.style.display = "none";
      svg.appendChild(crosshair);

      function handleMove(evt) {
        const rect = svg.getBoundingClientRect();
        const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
        const svgX = ((clientX - rect.left) / rect.width) * viewW;

        let nearest = distinctTimes[0], nearestDist = Infinity;
        for (const t of distinctTimes) {
          const dist = Math.abs(xScale(new Date(t).getTime()) - svgX);
          if (dist < nearestDist) { nearestDist = dist; nearest = t; }
        }
        const nx = xScale(new Date(nearest).getTime());
        crosshair.setAttribute("x1", nx);
        crosshair.setAttribute("x2", nx);
        crosshair.style.display = "block";

        tooltip.innerHTML = "";
        const timeEl = document.createElement("div");
        timeEl.className = "tooltip-time";
        timeEl.textContent = new Date(nearest).toLocaleString();
        tooltip.appendChild(timeEl);

        for (const row of chartRawData.filter((r) => r.timestamp === nearest)) {
          const line = document.createElement("div");
          line.className = "tooltip-row";
          const key = document.createElement("span");
          key.className = "tooltip-key";
          key.style.background = colorForLocation(row.location);
          const label = document.createElement("span");
          label.className = "tooltip-label";
          label.textContent = row.location;
          const value = document.createElement("span");
          value.className = "tooltip-value";
          value.textContent = row.temperature_c.toFixed(1) + "°C";
          line.append(key, label, value);
          tooltip.appendChild(line);
        }
        tooltip.classList.remove("hidden");

        const wrapRect = svg.parentElement.getBoundingClientRect();
        let left = clientX - wrapRect.left + 12;
        if (left + 160 > wrapRect.width) left = Math.max(0, clientX - wrapRect.left - 172);
        tooltip.style.left = left + "px";
      }

      hitRect.addEventListener("pointermove", handleMove);
      hitRect.addEventListener("pointerleave", () => {
        crosshair.style.display = "none";
        tooltip.classList.add("hidden");
      });
    }

    // Resume an existing session (survives page reloads within the same tab,
    // cleared when the tab/browser closes — sessionStorage, not localStorage).
    (async function init() {
      if (!token()) { showLogin(); return; }
      try {
        const s = await api("/session");
        if (s.logged_in) { showApp(); return; }
      } catch (e) { /* falls through to login */ }
      setToken(null);
      showLogin();
    })();
  </script>
</body>
</html>
